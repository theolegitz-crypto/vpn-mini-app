<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Аккаунт · VPN</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0b0b;
      background-image: radial-gradient(circle at 30% 20%, rgba(60,60,60,0.3) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(40,40,40,0.2) 0%, transparent 60%);
      color: #e0e0e0;
      font-family: 'SF Mono', 'Menlo', 'Monaco', 'Cascadia Code', 'Fira Code', monospace;
      min-height: 100vh;
      padding: 18px 14px 24px;
      -webkit-font-smoothing: antialiased;
      line-height: 1.4;
    }

    /* Liquid Glass Panel */
    .glass-panel {
      background: rgba(20, 20, 24, 0.45);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      padding: 20px 18px;
      margin-bottom: 18px;
      box-shadow: 0 12px 28px -8px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.02);
    }

    h2 {
      font-weight: 500;
      font-size: 20px;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #f0f0f0;
    }

    .section-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #999;
      margin-bottom: 12px;
    }

    /* Баланс */
    .balance-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }
    .balance-amount {
      font-size: 36px;
      font-weight: 300;
      letter-spacing: 1px;
    }
    .balance-currency {
      font-size: 16px;
      color: #aaa;
      margin-left: 6px;
    }

    /* Кнопки действий */
    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
    }
    .action-btn {
      background: rgba(40,40,45,0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 16px 8px;
      font-weight: 500;
      font-size: 14px;
      color: #f0f0f0;
      cursor: pointer;
      box-shadow: 0 6px 14px -6px rgba(0,0,0,0.4);
      transition: background 0.15s, transform 0.1s;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .action-btn:active {
      transform: scale(0.97);
      background: rgba(70,70,80,0.6);
    }
    .action-icon {
      font-size: 24px;
    }

    /* Список устройств */
    .device-item {
      display: flex;
      align-items: center;
      padding: 12px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .device-item:last-child { border-bottom: none; }
    .device-icon {
      font-size: 24px;
      margin-right: 16px;
      opacity: 0.8;
    }
    .device-info {
      flex: 1;
    }
    .device-name {
      font-weight: 500;
      font-size: 16px;
      margin-bottom: 4px;
    }
    .device-meta {
      font-size: 12px;
      color: #aaa;
    }
    .device-status {
      color: #8bc34a;
      font-size: 12px;
    }
    .device-status.blocked {
      color: #ff6b6b;
    }

    /* Разделитель */
    .divider {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin: 18px 0 10px;
      color: #777;
      font-size: 12px;
    }

    /* QR placeholder */
    .qr-placeholder {
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 24px;
      text-align: center;
      border: 1px dashed rgba(255,255,255,0.15);
      margin-top: 16px;
      font-size: 14px;
      color: #aaa;
    }

    .btn {
      background: rgba(40,40,45,0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50px;
      padding: 14px 20px;
      font-weight: 500;
      font-size: 14px;
      letter-spacing: 0.8px;
      color: #f0f0f0;
      cursor: pointer;
      box-shadow: 0 6px 14px -6px rgba(0,0,0,0.4);
      transition: all 0.15s;
      text-align: center;
      width: 100%;
    }
    .btn:active {
      transform: scale(0.98);
      background: rgba(70,70,80,0.6);
    }

    .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }

    /* Индикатор загрузки */
    .loading {
      text-align: center;
      padding: 20px;
      color: #aaa;
    }
  </style>
</head>
<body class="safe-bottom">

  <!-- Профиль / Баланс -->
  <div class="glass-panel">
    <div class="section-label">╱ БАЛАНС</div>
    <div class="balance-row">
      <span class="balance-amount" id="balanceDisplay">— <span class="balance-currency">₽</span></span>
      <span style="color: #aaa;" id="userIdDisplay">ID: ...</span>
    </div>
    <div style="margin-top: 8px; font-size: 13px; color: #aaa;" id="expiresDisplay">
      Загрузка...
    </div>
  </div>

  <!-- Быстрые действия -->
  <div class="glass-panel">
    <div class="section-label">╱ ДЕЙСТВИЯ</div>
    <div class="action-grid">
      <div class="action-btn" id="topupBtn">
        <span class="action-icon">💳</span>
        <span>Пополнить</span>
      </div>
      <div class="action-btn" id="inviteBtn">
        <span class="action-icon">👥</span>
        <span>Пригласить</span>
      </div>
      <div class="action-btn" id="createLinkBtn">
        <span class="action-icon">🔗</span>
        <span>Создать ссылку</span>
      </div>
      <div class="action-btn" id="showQrBtn">
        <span class="action-icon">📱</span>
        <span>Показать QR</span>
      </div>
    </div>
  </div>

  <!-- Устройства -->
  <div class="glass-panel">
    <div class="section-label" id="devicesCounter">╱ УСТРОЙСТВА (—/—)</div>
    <div id="deviceList">
      <div class="loading">Загрузка устройств...</div>
    </div>
    <div style="margin-top: 16px;">
      <button class="btn" id="addDeviceBtn">+ Добавить устройство</button>
    </div>
  </div>

  <!-- Блок для отображения QR (появляется при нажатии) -->
  <div class="glass-panel" id="qrPanel" style="display: none;">
    <div class="section-label">╱ QR‑КОД ДЛЯ ПОДКЛЮЧЕНИЯ</div>
    <div class="qr-placeholder">
      <div style="font-size: 48px; margin-bottom: 12px;">⬛⬜⬛<br>⬜⬛⬜<br>⬛⬜⬛</div>
      <div>Отсканируйте для настройки</div>
      <div style="margin-top: 12px; font-size: 12px;">WireGuard • iOS/Android</div>
    </div>
    <button class="btn" id="closeQrBtn" style="margin-top: 12px;">Закрыть</button>
  </div>

  <!-- Ссылка-приглашение (появляется при создании) -->
  <div class="glass-panel" id="linkPanel" style="display: none;">
    <div class="section-label">╱ РЕФЕРАЛЬНАЯ ССЫЛКА</div>
    <div style="background: rgba(0,0,0,0.2); border-radius: 20px; padding: 16px; margin: 12px 0;">
      <code id="refLink" style="word-break: break-all; color: #ccc;">https://t.me/VpnBot?start=ref...</code>
    </div>
    <div style="display: flex; gap: 12px;">
      <button class="btn" id="copyLinkBtn">📋 Копировать</button>
      <button class="btn" id="shareLinkBtn">📤 Поделиться</button>
    </div>
    <button class="btn" id="closeLinkBtn" style="margin-top: 12px;">Закрыть</button>
  </div>

  <script>
    (function() {
      const tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();

      // ---------- НАСТРОЙКИ ----------
      const API_BASE_URL = 'https://your-server.com:8000'; // ⚠️ ЗАМЕНИТЕ НА РЕАЛЬНЫЙ АДРЕС СЕРВЕРА

      // Элементы интерфейса
      const balanceEl = document.getElementById('balanceDisplay');
      const userIdEl = document.getElementById('userIdDisplay');
      const expiresEl = document.getElementById('expiresDisplay');
      const devicesCounterEl = document.getElementById('devicesCounter');
      const deviceListEl = document.getElementById('deviceList');
      const qrPanel = document.getElementById('qrPanel');
      const linkPanel = document.getElementById('linkPanel');
      const refLinkEl = document.getElementById('refLink');

      // ---------- ФУНКЦИЯ ЗАГРУЗКИ ДАННЫХ ИЗ API ----------
      async function loadAccountData() {
        try {
          const initData = tg.initData;
          if (!initData) {
            showError('Нет initData. Откройте приложение из Telegram.');
            return;
          }

          const response = await fetch(`${API_BASE_URL}/api/account?initData=${encodeURIComponent(initData)}`);
          if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`Ошибка ${response.status}: ${errorText}`);
          }

          const data = await response.json();
          updateUI(data);
        } catch (error) {
          console.error('Ошибка загрузки данных:', error);
          showError('Не удалось загрузить данные аккаунта');
        }
      }

      function updateUI(data) {
        // Баланс (в копейках -> рубли)
        const balanceRub = (data.balance_cents / 100).toFixed(2);
        balanceEl.innerHTML = `${balanceRub} <span class="balance-currency">₽</span>`;

        // ID пользователя (можно взять из initData или БД)
        const user = tg.initDataUnsafe?.user;
        if (user) {
          userIdEl.textContent = `ID: ${user.id}`;
        }

        // Подписка
        if (data.expires_at) {
          const expiresDate = new Date(data.expires_at);
          const formatted = expiresDate.toLocaleDateString('ru-RU', {
            day: '2-digit', month: '2-digit', year: 'numeric'
          });
          expiresEl.textContent = `Подписка активна до: ${formatted}`;
        } else {
          expiresEl.textContent = 'Нет активной подписки';
        }

        // Устройства
        const devices = data.devices || [];
        const devicesCount = devices.length;
        const devicesLimit = data.devices_limit || 0;
        devicesCounterEl.textContent = `╱ УСТРОЙСТВА (${devicesCount}/${devicesLimit})`;

        // Рендер списка устройств
        if (devicesCount === 0) {
          deviceListEl.innerHTML = '<div class="loading">Нет подключённых устройств</div>';
        } else {
          deviceListEl.innerHTML = '';
          devices.forEach(device => {
            const deviceEl = createDeviceElement(device);
            deviceListEl.appendChild(deviceEl);
          });
        }

        // Обновляем реферальную ссылку (если есть в данных)
        if (data.referral_link) {
          refLinkEl.textContent = data.referral_link;
        } else {
          // Генерируем демо-ссылку на основе ID
          if (user) {
            refLinkEl.textContent = `https://t.me/VpnBot?start=ref${user.id}`;
          }
        }
      }

      function createDeviceElement(device) {
        const div = document.createElement('div');
        div.className = 'device-item';

        const icon = getDeviceIcon(device.platform);
        const statusClass = device.is_blocked ? 'blocked' : '';
        const statusText = device.is_blocked ? '⛔ заблокирован' : '● активен';

        div.innerHTML = `
          <span class="device-icon">${icon}</span>
          <div class="device-info">
            <div class="device-name">${escapeHtml(device.device_name) || 'Без имени'}</div>
            <div class="device-meta">${escapeHtml(device.platform) || 'unknown'}</div>
          </div>
          <div class="device-status ${statusClass}">${statusText}</div>
        `;
        return div;
      }

      function getDeviceIcon(platform) {
        const icons = {
          'ios': '📱',
          'android': '📱',
          'windows': '💻',
          'macos': '💻',
          'linux': '🐧',
          'other': '📟'
        };
        return icons[platform?.toLowerCase()] || '📟';
      }

      function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      function showError(message) {
        balanceEl.innerHTML = `— <span class="balance-currency">₽</span>`;
        expiresEl.textContent = 'Ошибка загрузки';
        deviceListEl.innerHTML = `<div class="loading">${message}</div>`;
        tg.showPopup({ title: 'Ошибка', message });
      }

      // ---------- ОБРАБОТЧИКИ ДЕЙСТВИЙ ----------
      document.getElementById('topupBtn').addEventListener('click', () => {
        tg.sendData(JSON.stringify({ action: 'topup_balance' }));
        tg.showPopup({ title: 'Пополнение', message: 'Выберите способ оплаты в боте' });
        tg.HapticFeedback?.impactOccurred('medium');
      });

      document.getElementById('inviteBtn').addEventListener('click', () => {
        tg.sendData(JSON.stringify({ action: 'invite_friend' }));
        linkPanel.style.display = 'block';
        tg.HapticFeedback?.impactOccurred('light');
      });

      document.getElementById('createLinkBtn').addEventListener('click', () => {
        tg.sendData(JSON.stringify({ action: 'create_referral_link' }));
        linkPanel.style.display = 'block';
        tg.HapticFeedback?.impactOccurred('light');
      });

      document.getElementById('showQrBtn').addEventListener('click', () => {
        qrPanel.style.display = 'block';
        tg.sendData(JSON.stringify({ action: 'show_qr' }));
        tg.HapticFeedback?.impactOccurred('light');
      });

      document.getElementById('closeQrBtn').addEventListener('click', () => {
        qrPanel.style.display = 'none';
      });

      document.getElementById('closeLinkBtn').addEventListener('click', () => {
        linkPanel.style.display = 'none';
      });

      document.getElementById('copyLinkBtn').addEventListener('click', () => {
        const link = refLinkEl.textContent;
        navigator.clipboard?.writeText(link).then(() => {
          tg.showPopup({ title: 'Готово', message: 'Ссылка скопирована' });
          tg.HapticFeedback?.notificationOccurred('success');
        }).catch(() => {
          tg.showPopup({ title: 'Скопируйте вручную', message: link });
        });
      });

      document.getElementById('shareLinkBtn').addEventListener('click', () => {
        const link = refLinkEl.textContent;
        tg.sendData(JSON.stringify({ action: 'share_link', url: link }));
        tg.showPopup({ title: 'Поделиться', message: 'Отправьте ссылку другу' });
      });

      document.getElementById('addDeviceBtn').addEventListener('click', () => {
        tg.sendData(JSON.stringify({ action: 'add_device' }));
        tg.showPopup({ title: 'Новое устройство', message: 'Следуйте инструкциям бота для добавления' });
        tg.HapticFeedback?.impactOccurred('medium');
      });

      // Главная кнопка Telegram
      tg.MainButton.setText('💳 Пополнить баланс').show();
      tg.MainButton.onClick(() => {
        tg.sendData(JSON.stringify({ action: 'quick_topup' }));
        tg.close();
      });

      // ---------- ЗАПУСК ----------
      loadAccountData();
    })();
  </script>
</body>
</html>
