<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Premium VPN Access</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #55aaff;
      --secondary: #8855ff;
      --accent: #ff55cc;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.12);
      --bg-dark: #07070a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-dark);
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      padding: 24px 16px;
      line-height: 1.5;
    }

    /* Анимированный жидкий фон */
    .bg-blobs {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1;
      filter: blur(80px);
      overflow: hidden;
    }

    .blob {
      position: absolute;
      width: 250px;
      height: 250px;
      background: var(--primary);
      border-radius: 50%;
      opacity: 0.2;
      animation: move 20s infinite alternate cubic-bezier(0.45, 0.05, 0.55, 0.95);
    }
    .blob-1 { top: -50px; left: -50px; background: var(--secondary); }
    .blob-2 { bottom: -50px; right: -50px; background: var(--accent); animation-delay: -5s; }
    .blob-3 { top: 40%; left: 50%; background: var(--primary); animation-duration: 15s; }

    @keyframes move {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(100px, 50px) scale(1.2); }
    }

    /* Основная панель */
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(25px) saturate(180%);
      -webkit-backdrop-filter: blur(25px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      padding: 24px;
      margin-bottom: 20px;
      position: relative;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }

    .glass-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 32px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent, rgba(255,255,255,0.05));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite: exclude;
      pointer-events: none;
    }

    .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--primary);
      font-weight: 600;
      margin-bottom: 12px;
      display: block;
    }

    /* Баланс */
    .balance-val {
      font-size: 48px;
      font-weight: 300;
      letter-spacing: -2px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .currency { font-size: 20px; color: #777; font-weight: 400; margin-top: 12px; }

    .expiry-info {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-dot {
      width: 8px; height: 8px;
      background: #4ade80;
      border-radius: 50%;
      box-shadow: 0 0 12px #4ade80;
    }

    /* Сетка действий */
    .action-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .action-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      cursor: pointer;
    }

    .action-item:active {
      transform: scale(0.95);
      background: rgba(255,255,255,0.08);
    }

    .action-icon {
      font-size: 28px;
      filter: drop-shadow(0 0 8px var(--primary));
    }

    .action-text { font-size: 13px; font-weight: 500; color: #eee; }

    /* Список устройств */
    .device-row {
      display: flex;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .device-row:last-child { border-bottom: none; }

    .dev-icon {
      width: 44px; height: 44px;
      background: rgba(255,255,255,0.06);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 16px;
      font-size: 20px;
    }

    .dev-info { flex: 1; }
    .dev-name { font-size: 15px; font-weight: 600; }
    .dev-meta { font-size: 12px; color: #888; }

    .dev-status {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(74, 222, 128, 0.1);
      color: #4ade80;
      border: 1px solid rgba(74, 222, 128, 0.2);
    }

    /* Кастомная кнопка */
    .btn-grad {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 16px;
      width: 100%;
      font-weight: 600;
      font-size: 15px;
      margin-top: 15px;
      box-shadow: 0 10px 20px -5px rgba(85, 170, 255, 0.4);
      transition: opacity 0.2s;
    }
    .btn-grad:active { opacity: 0.8; transform: scale(0.98); }

    /* Панель QR (BottomSheet) */
    .bottom-sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .bottom-sheet.open { transform: translateY(0); }

    .qr-area {
      background: #fff;
      border-radius: 24px;
      padding: 20px;
      width: 200px;
      height: 200px;
      margin: 20px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-weight: bold;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      display: none;
      z-index: 90;
    }

    .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
  </style>
</head>
<body class="safe-bottom">

  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="glass-card">
    <span class="label">Balance Status</span>
    <div class="balance-val" id="balanceDisplay">
      0.00 <span class="currency">₽</span>
    </div>
    <div class="expiry-info" id="expiresDisplay">
      <div class="status-dot"></div> Загрузка данных...
    </div>
  </div>

  <div class="action-grid">
    <div class="action-item" id="topupBtn">
      <span class="action-icon">💳</span>
      <span class="action-text">Пополнить</span>
    </div>
    <div class="action-item" id="showQrBtn">
      <span class="action-icon">📡</span>
      <span class="action-text">QR-Код</span>
    </div>
    <div class="action-item" id="inviteBtn">
      <span class="action-icon">🎁</span>
      <span class="action-text">Бонусы</span>
    </div>
    <div class="action-item" id="createLinkBtn">
      <span class="action-icon">🔗</span>
      <span class="action-text">Ссылка</span>
    </div>
  </div>

  <div class="glass-card" style="margin-top: 20px;">
    <span class="label" id="devicesCounter">Active Devices (0/0)</span>
    <div id="deviceList">
      <div style="text-align: center; padding: 20px; color: rgba(255,255,255,0.3);">
        Получение списка устройств...
      </div>
    </div>
    <button class="btn-grad" id="addDeviceBtn">+ Добавить устройство</button>
  </div>

  <div class="overlay" id="overlay"></div>

  <div class="glass-card bottom-sheet" id="qrSheet">
    <span class="label">Connection Config</span>
    <h3 style="text-align: center; margin-top: 10px;">Отсканируйте код</h3>
    <div class="qr-area">
      QR PLACEHOLDER
    </div>
    <button class="btn-grad" id="closeQrBtn" style="background: rgba(255,255,255,0.1); box-shadow: none;">Закрыть</button>
  </div>

  <script>
    (function() {
      const tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();

      // Настройка цветов под тему Telegram
      if (tg.themeParams.button_color) {
        document.documentElement.style.setProperty('--primary', tg.themeParams.button_color);
      }

      // Элементы
      const qrSheet = document.getElementById('qrSheet');
      const overlay = document.getElementById('overlay');

      // Функции анимации панелей
      function openSheet() {
        qrSheet.classList.add('open');
        overlay.style.display = 'block';
        tg.HapticFeedback.impactOccurred('medium');
      }

      function closeSheet() {
        qrSheet.classList.remove('open');
        overlay.style.display = 'none';
      }

      document.getElementById('showQrBtn').onclick = openSheet;
      document.getElementById('closeQrBtn').onclick = closeSheet;
      overlay.onclick = closeSheet;

      // Имитация загрузки данных
      setTimeout(() => {
        document.getElementById('balanceDisplay').innerHTML = `1,450.00 <span class="currency">₽</span>`;
        document.getElementById('expiresDisplay').innerHTML = `<div class="status-dot"></div> Подписка активна до 12.06.2026`;
        document.getElementById('devicesCounter').innerText = "Active Devices (2/5)";
        
        const deviceList = document.getElementById('deviceList');
        deviceList.innerHTML = `
          <div class="device-row">
            <div class="dev-icon">📱</div>
            <div class="dev-info">
              <div class="dev-name">iPhone 15 Pro</div>
              <div class="dev-meta">WireGuard • Нидерланды</div>
            </div>
            <div class="dev-status">Online</div>
          </div>
          <div class="device-row">
            <div class="dev-icon">💻</div>
            <div class="dev-info">
              <div class="dev-name">MacBook Air</div>
              <div class="dev-meta">VLESS • Германия</div>
            </div>
            <div class="dev-status">Online</div>
          </div>
        `;
      }, 1500);

      // Обработчики с Haptic Feedback
      document.querySelectorAll('.action-item, .btn-grad').forEach(btn => {
        btn.addEventListener('click', () => {
          tg.HapticFeedback.selectionChanged();
        });
      });

    })();
  </script>
</body>
</html>
